<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> — SGPA & CGPA  Calculator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-top">
      <h2>&#127891; SGPA & CGPA  Calculator</h2>
      <button class="dark-toggle" onclick="toggleDark()" style="background:var(--border);color:var(--text);border:none;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:.8rem;">&#127769; Dark</button>
    </div>
    <p class="subtitle" id="authSubtitle">Sign in to your account</p>

    <!-- Login -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"/>
      </div>
      <div id="loginError" class="error"></div>
      <button class="btn btn-primary btn-full" onclick="handleLogin()">Sign In</button>
      <button class="btn btn-google" onclick="handleGoogle('login')">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G"/> Continue with Google
      </button>
      <div class="auth-switch">Don't have an account? <a onclick="switchForm('signup')">Sign Up</a></div>
    </div>

    <!-- Signup -->
    <div id="signupForm" style="display:none;">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your Name"/>
      </div>
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" id="signupRoll" placeholder="Your Roll No"/>
      </div>
      <div class="form-group">
        <label>Branch</label>
        <input type="text" id="signupBranch" placeholder="Your Branch"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 6 characters"/>
      </div>
      <div id="signupError" class="error"></div>
      <button class="btn btn-primary btn-full" onclick="handleSignup()">Create Account</button>
      <button class="btn btn-google" onclick="handleGoogle('signup')">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G"/> Continue with Google
      </button>
      <div class="auth-switch">Already have an account? <a onclick="switchForm('login')">Sign In</a></div>
    </div>
  </div>
</div>

<script type="module">
  import { redirectIfLoggedIn, signUp, signIn, googleSignIn, friendlyError, initDarkMode, toggleDark } from "./app.js";
  window.toggleDark = toggleDark;
  initDarkMode();
  redirectIfLoggedIn();

  window.switchForm = mode => {
    const login = mode === "login";
    document.getElementById("loginForm").style.display  = login ? "" : "none";
    document.getElementById("signupForm").style.display = login ? "none" : "";
    document.getElementById("authSubtitle").textContent = login ? "Sign in to your account" : "Create a new account";
    document.getElementById("loginError").textContent   = "";
    document.getElementById("signupError").textContent  = "";
  };

  window.handleLogin = async () => {
    const email = document.getElementById("loginEmail").value.trim();
    const pass  = document.getElementById("loginPassword").value;
    const err   = document.getElementById("loginError");
    err.textContent = "";
    if (!email || !pass) { err.textContent = "Please fill in all fields."; return; }
    try { await signIn(email, pass); location.href = "dashboard.html"; }
    catch(e) { err.textContent = friendlyError(e.code); }
  };

  window.handleSignup = async () => {
    const name   = document.getElementById("signupName").value.trim();
    const roll   = document.getElementById("signupRoll").value.trim();
    const branch = document.getElementById("signupBranch").value.trim();
    const email  = document.getElementById("signupEmail").value.trim();
    const pass   = document.getElementById("signupPassword").value;
    const err    = document.getElementById("signupError");
    err.textContent = "";
    if (!name || !roll || !branch || !email || !pass) { err.textContent = "Please fill in all fields."; return; }
    if (pass.length < 6) { err.textContent = "Password must be at least 6 characters."; return; }
    try { await signUp(name, email, pass, roll, branch); location.href = "dashboard.html"; }
    catch(e) { err.textContent = friendlyError(e.code); }
  };

  window.handleGoogle = async form => {
    const errId = form === "signup" ? "signupError" : "loginError";
    try { await googleSignIn(); location.href = "dashboard.html"; }
    catch(e) { document.getElementById(errId).textContent = friendlyError(e.code); }
  };

  document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const loginVisible = document.getElementById("loginForm").style.display !== "none";
    loginVisible ? handleLogin() : handleSignup();
  });
</script>
</body>
</html>
