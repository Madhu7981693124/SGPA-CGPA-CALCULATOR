<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SGPA — SGPA & CGPA   Calculator</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<header>
  <div><h1>&#127891; SGPA & CGPA   Calculator</h1><p>R23 Regulation</p></div>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="dark-toggle" onclick="toggleDark()">&#127769; Dark</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>
<nav>
  <a href="dashboard.html">&#127968; Dashboard</a>
  <a href="sgpa.html">&#128202; SGPA</a>
  <a href="cgpa.html">&#128200; CGPA</a>
  <a href="about.html">&#8505;&#65039; About</a>
</nav>

<div class="page">
  <div class="card">
    <h2>&#128202; SGPA Calculator</h2>
    <div class="sem-select-row">
      <div>
        <label>Semester</label>
        <select id="semSelect" onchange="saveAutoSave()">
          <option value="">-- Select Semester --</option>
          <option>Semester 1</option><option>Semester 2</option>
          <option>Semester 3</option><option>Semester 4</option>
          <option>Semester 5</option><option>Semester 6</option>
          <option>Semester 7</option><option>Semester 8</option>
        </select>
      </div>
    </div>
    <div id="subjectRows"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="addSubject()">+ Add Subject</button>
      <button class="btn btn-primary" onclick="calcSGPA()">Calculate SGPA</button>
      <button class="btn btn-danger"  onclick="resetForm()">Reset</button>
    </div>
    <div id="sgpaError" class="error"></div>
    <div id="sgpaResult" style="display:none;">
      <div class="result-box">
        <div class="sub" id="sgpaSemLabel"></div>
        <div class="value" id="sgpaValue">0.00</div>
        <div class="sub" id="sgpaPercent"></div>
        <div class="perf" id="sgpaPerf"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-success" onclick="saveCloud()">&#128190; Save to CGPA</button>
        <button class="btn btn-outline" onclick="dlPDF()">&#128196; Download PDF</button>
        <button class="btn btn-outline" onclick="exportCSV()">&#128196; Export CSV</button>
      </div>
      <div id="saveMsg" class="info" style="margin-top:8px;"></div>
    </div>
  </div>

<script type="module">
  import { requireAuth, saveSemester, GRADE_POINTS, gradePerformance, toPercent,
           toggleDark, logout, initDarkMode, setActiveNav, pdfNewPageIfNeeded, stripEmoji } from "./app.js";
  window.toggleDark = toggleDark;
  window.logout = logout;
  initDarkMode();
  setActiveNav();

  let count = 0, user = null, last = null, saved = false;

  requireAuth(u => {
    user = u;
    document.getElementById("userChip").textContent = u.email;
    loadAutoSave();
    addSubject(); addSubject();
  });

  function saveAutoSave() {
    const data = {
      sem: document.getElementById("semSelect").value,
      subjects: []
    };
    document.querySelectorAll("#subjectRows .subject-row").forEach(row => {
      const id = row.id.split("-")[1];
      data.subjects.push({
        name: document.getElementById("name-" + id).value,
        credit: document.getElementById("credit-" + id).value,
        grade: document.getElementById("grade-" + id).value
      });
    });
    localStorage.setItem("sgpaAutoSave", JSON.stringify(data));
  }

  function loadAutoSave() {
    const data = JSON.parse(localStorage.getItem("sgpaAutoSave") || "{}");
    if (data.sem) document.getElementById("semSelect").value = data.sem;
    if (data.subjects && data.subjects.length) {
      document.getElementById("subjectRows").innerHTML = "";
      count = 0;
      data.subjects.forEach(sub => {
        addSubject();
        const id = count;
        document.getElementById("name-" + id).value = sub.name || "";
        document.getElementById("credit-" + id).value = sub.credit || "";
        document.getElementById("grade-" + id).value = sub.grade || "";
      });
    }
  }

  window.addSubject = () => {
    count++;
    const id = count;
    const row = document.createElement("div");
    row.className = "subject-row";
    row.id = "row-" + id;
    row.innerHTML =
      '<div class="sub-name"><label>Subject Name</label>' +
      '<input type="text" placeholder="e.g. Mathematics" id="name-' + id + '" oninput="saveAutoSave()"/></div>' +
      '<div><label>Credits</label>' +
      '<input type="number" min="1" max="6" placeholder="1-6" id="credit-' + id + '" oninput="saveAutoSave()"/></div>' +
      '<div><label>Grade</label>' +
      '<select id="grade-' + id + '" onchange="saveAutoSave()"><option value="">Grade</option>' +
      '<option>S</option><option>A</option><option>B</option><option>C</option>' +
      '<option>D</option><option>E</option><option>F</option><option>Ab</option></select></div>' +
      '<button class="remove-btn" onclick="removeSubject(' + id + ')">&#x2715;</button>';
    document.getElementById("subjectRows").appendChild(row);
  };

  window.removeSubject = id => document.getElementById("row-" + id)?.remove();

  window.resetForm = () => {
    document.getElementById("subjectRows").innerHTML = "";
    document.getElementById("semSelect").value = "";
    document.getElementById("sgpaResult").style.display = "none";
    document.getElementById("sgpaError").textContent = "";
    document.getElementById("saveMsg").textContent = "";
    count = 0; last = null; saved = false;
    localStorage.removeItem("sgpaAutoSave");
    addSubject(); addSubject();
  };

  window.calcSGPA = () => {
    const err = document.getElementById("sgpaError");
    err.textContent = "";
    document.getElementById("saveMsg").textContent = "";
    saved = false;
    const sem = document.getElementById("semSelect").value;
    if (!sem) { err.textContent = "Please select a semester."; return; }
    const rows = document.querySelectorAll("#subjectRows .subject-row");
    if (!rows.length) { err.textContent = "Add at least one subject."; return; }
    let tc = 0, tp = 0, valid = true, subjects = [];
    rows.forEach(row => {
      const id = row.id.split("-")[1];
      const nm = document.getElementById("name-" + id).value.trim() || "Subject";
      const cr = parseFloat(document.getElementById("credit-" + id).value);
      const gr = document.getElementById("grade-" + id).value;
      if (!cr || cr < 1 || cr > 6 || !gr) { valid = false; }
      else { tc += cr; tp += cr * GRADE_POINTS[gr]; subjects.push({ name: nm, credit: cr, grade: gr }); }
    });
    if (!valid) { err.textContent = "Fill all credits (1-6) and grades correctly."; return; }
    const sgpa = parseFloat((tp/tc).toFixed(2));
    document.getElementById("sgpaValue").textContent   = sgpa.toFixed(2);
    document.getElementById("sgpaPercent").textContent = "approx " + toPercent(sgpa) + "%";
    document.getElementById("sgpaSemLabel").textContent = sem;
    document.getElementById("sgpaPerf").textContent    = gradePerformance(sgpa);
    document.getElementById("sgpaResult").style.display = "";
    last = { sem, sgpa, credits: tc, subjects };
  };

  window.saveCloud = async () => {
    const msg = document.getElementById("saveMsg");
    if (!last)  { msg.textContent = "Calculate SGPA first."; return; }
    if (saved)  { msg.textContent = "Already saved!"; return; }
    msg.textContent = "Saving...";
    try {
      await saveSemester(user.uid, last);
      msg.textContent = last.sem + " saved successfully!";
      saved = true;
    } catch(e) {
      msg.textContent = "Failed to save. Check your connection.";
    }
  };

  window.dlPDF = () => {
    if (!last) { document.getElementById("sgpaError").textContent = "Calculate SGPA first."; return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const sem  = last.sem;
    const perf = stripEmoji(document.getElementById("sgpaPerf").textContent);
    const title = "JAWAHARLAL NEHRU TECHNOLOGICAL UNIVERSITY GURJAJADA VIZIANAGARAM";
    const subtitle = "III B. TECH | SEMESTER REGULAR EXAMINATIONS (R23)";

    doc.setFontSize(12);
    doc.text(title, 40, 40);
    doc.setFontSize(10);
    doc.text(subtitle, 40, 56);
    doc.setLineWidth(1);
    doc.line(40, 66, 555, 66);

    doc.setFontSize(16);
    doc.text("SGPA RESULT", 40, 90);
    doc.setFontSize(11);
    doc.text(`Semester : ${sem}`, 40, 112);
    doc.text(`SGPA     : ${last.sgpa.toFixed(2)}`, 40, 128);
    doc.text(`Credits  : ${last.credits}`, 40, 144);
    doc.text(`Subjects : ${last.subjects.length}`, 40, 160);
    doc.text(`Performance: ${perf}`, 40, 176);

    let y = 202;
    doc.setFontSize(11);
    doc.text("S.no", 40, y);
    doc.text("Subject", 80, y);
    doc.text("Grade", 320, y);
    doc.text("Grade Point", 380, y);
    doc.text("Credits", 450, y);
    doc.text("Status", 510, y);
    y += 8;
    doc.setLineWidth(0.5);
    doc.line(40, y, 555, y);
    y += 16;

    last.subjects.forEach((sub, index) => {
      y = pdfNewPageIfNeeded(doc, y + 2);
      const status = ["F", "Ab"].includes(sub.grade) ? "Fail" : "Pass";
      doc.text(String(index + 1), 40, y);
      doc.text(sub.name || "Subject", 80, y);
      doc.text(sub.grade, 320, y);
      doc.text(String(GRADE_POINTS[sub.grade] || 0), 385, y);
      doc.text(String(sub.credit), 455, y);
      doc.text(status, 510, y);
      y += 18;
    });

    y += 12;
    if (y > 740) y = pdfNewPageIfNeeded(doc, y);
    doc.setFontSize(10);
    doc.text(`Generated from SGPA & CGPA Calculator`, 40, y);
    doc.save(`SGPA_${sem.replace(/\s+/g, "_")}.pdf`);
  };

  window.exportCSV = () => {
    if (!last) { document.getElementById("sgpaError").textContent = "Calculate SGPA first."; return; }
    let csv = "Subject,Credits,Grade,Points\n";
    document.querySelectorAll("#subjectRows .subject-row").forEach(row => {
      const id = row.id.split("-")[1];
      const nm = document.getElementById("name-" + id).value || "Subject";
      const cr = document.getElementById("credit-" + id).value;
      const gr = document.getElementById("grade-" + id).value;
      const pt = GRADE_POINTS[gr] || 0;
      csv += `"${nm}",${cr},${gr},${pt}\n`;
    });
    csv += `\nSemester,${last.sem}\nSGPA,${last.sgpa}\nCredits,${last.credits}\n`;
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "SGPA_" + last.sem.replace(/\s+/g,"_") + ".csv";
    a.click();
    URL.revokeObjectURL(url);
  };
</script>
</body>
</html>
