<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CGPA — SGPA & CGPA Calculator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<header>
  <div><h1>&#127891; SGPA & CGPA Calculator</h1><p>R23 Regulation</p></div>
  <div class="header-right">
    <span class="user-chip" id="userChip">...</span>
    <button class="dark-toggle" onclick="toggleDark()">&#127769; Dark</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>
<nav>
  <a href="dashboard.html">&#127968; Dashboard</a>
  <a href="sgpa.html">&#128202; SGPA</a>
  <a href="cgpa.html">&#128200; CGPA</a>
  <a href="about.html">&#8505;&#65039; About</a>
</nav>

<div class="page">
  <div class="main-content">
    <div class="card">
      <h2>&#128200; CGPA Calculator</h2>
      <p class="info" id="noDataMsg">No semesters saved yet. Calculate and save your SGPA first.</p>
      <div id="semList"></div>
      <div id="cgpaResult" style="display:none;">
        <div class="result-box">
          <div class="sub">Overall CGPA</div>
          <div class="value" id="cgpaValue">0.00</div>
          <div class="sub" id="cgpaPercent"></div>
          <div class="perf" id="cgpaPerf"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>&#128203; Semester Breakdown</h2>
      <div id="semBreakdown"><p class="info">No data yet.</p></div>
    </div>
  </div>
</div>
<aside class="sidebar">
  <div class="card profile-card">
    <div class="profile-top">
      <div class="profile-image">
        <img id="profileImage" src="https://i.pravatar.cc/150?u=placeholder" alt="Profile" />
      </div>
      <div class="profile-meta">
        <h3 id="profileNameTitle">Your Name</h3>
        <p id="profileBranchTitle">Branch</p>
        <p id="profileRollTitle">Roll No</p>
      </div>
    </div>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="profileName" placeholder="Your Name" readonly />
    </div>
    <div class="form-group">
      <label>Roll Number</label>
      <input type="text" id="profileRoll" placeholder="Your Roll No" readonly />
    </div>
    <div class="form-group">
      <label>Branch</label>
      <input type="text" id="profileBranch" placeholder="Your Branch" readonly />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="profileEmail" placeholder="you@example.com" readonly />
    </div>
  </div>
</aside>

<script type="module">
  import { requireAuth, getSemesters, gradePerformance, toPercent, toggleDark, logout, initDarkMode, setActiveNav, getUserProfile } from "./app.js";
  window.toggleDark = toggleDark;
  window.logout = logout;
  initDarkMode();
  setActiveNav();

  requireAuth(async user => {
    document.getElementById("userChip").textContent = user.email;
    await loadProfile(user);
    const sems = await getSemesters(user.uid);
    if (!sems.length) return;

    document.getElementById("noDataMsg").style.display = "none";

    const tw = sems.reduce((s, x) => s + parseFloat(x.sgpa) * x.credits, 0);
    const tc = sems.reduce((s, x) => s + x.credits, 0);
    const cgpa = parseFloat((tw / tc).toFixed(2));

    document.getElementById("cgpaValue").textContent = cgpa.toFixed(2);
    document.getElementById("cgpaPercent").textContent = "approx " + toPercent(cgpa) + "%";
    document.getElementById("cgpaPerf").textContent = gradePerformance(cgpa);
    document.getElementById("cgpaResult").style.display = "";

    document.getElementById("semBreakdown").innerHTML = sems.map(s => `
      <div class="sem-item">
        <div class="sem-info"><span>${s.sem}</span><span class="badge">${s.credits} cr</span></div>
        <div class="sem-actions"><span class="sgpa-val">SGPA: ${parseFloat(s.sgpa).toFixed(2)}</span></div>
      </div>`).join("");
  });

  async function loadProfile(currentUser) {
    try {
      const profile = await getUserProfile(currentUser.uid);
      const name = profile?.name || currentUser.displayName || "";
      const photoURL = profile?.photoURL || currentUser.photoURL || `https://i.pravatar.cc/150?u=${encodeURIComponent(currentUser.email || 'user')}`;
      document.getElementById("profileName").value = name;
      document.getElementById("profileRoll").value = profile?.roll || "";
      document.getElementById("profileBranch").value = profile?.branch || "";
      document.getElementById("profileEmail").value = currentUser.email || "";
      document.getElementById("profileNameTitle").textContent = name || "Your Name";
      document.getElementById("profileBranchTitle").textContent = profile?.branch || "Branch";
      document.getElementById("profileRollTitle").textContent = profile?.roll ? `Roll No: ${profile.roll}` : "Roll No";
      document.getElementById("profileImage").src = photoURL;
    } catch (error) {
      console.error("Profile load error:", error);
      // Fallback
      const name = currentUser.displayName || currentUser.email.split("@")[0] || "";
      document.getElementById("profileName").value = name;
      document.getElementById("profileNameTitle").textContent = name;
      document.getElementById("profileImage").src = currentUser.photoURL || `https://i.pravatar.cc/150?u=${encodeURIComponent(currentUser.email || 'user')}`;
    }
  }
</script>
</body>
</html>
